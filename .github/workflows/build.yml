name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Materialize upload text policy symkey
        shell: pwsh
        env:
          UPLOAD_TEXT_POLICY_SYMKEY_B64: ${{ secrets.UPLOAD_TEXT_POLICY_SYMKEY_B64 }}
        run: ./Resources/Embedded/materialize-upload-text-policy-symkey.ps1

      - name: Refresh embedded upload text policy (gzip + AES-GCM)
        shell: pwsh
        run: ./Resources/Embedded/gzip-policy.ps1

      - name: Restore and build
        run: |
          dotnet restore "Gamepad Mapping.csproj"
          dotnet build "Gamepad Mapping.csproj" -c Release --no-restore

  quality:
    name: Quality gates
    runs-on: windows-latest
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Materialize upload text policy symkey
        shell: pwsh
        env:
          UPLOAD_TEXT_POLICY_SYMKEY_B64: ${{ secrets.UPLOAD_TEXT_POLICY_SYMKEY_B64 }}
        run: ./Resources/Embedded/materialize-upload-text-policy-symkey.ps1

      - name: Refresh embedded upload text policy (gzip + AES-GCM)
        shell: pwsh
        run: ./Resources/Embedded/gzip-policy.ps1

      - name: Restore solution
        run: dotnet restore "GamepadMapping.sln"

      # Match release publish: obfuscate GamepadMapperGUI.UploadTextPolicyPayload so CI exercises the same IL as shipped builds.
      - name: Run tests
        run: dotnet test "GamepadMapping.sln" -c Release --no-restore --nologo -p:ObfuscateUploadTextPolicyPayload=true

      - name: Detect release-related changes
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            release_paths:
              - 'Updater/**'
              - 'publish/**'
              - 'Resources/Embedded/**'
              - 'Services/Infrastructure/CommunityUploadWorkerCredentials.cs'
              - 'Services/Infrastructure/CommunityTemplateWorkerUploadService.cs'
              - '.github/workflows/build.yml'
              - 'Gamepad Mapping.csproj'
              - 'GamepadMapping.sln'
              - 'UploadTextPolicyPayload/**'

      - name: Updater release preflight
        if: steps.changed.outputs.release_paths == 'true'
        shell: pwsh
        run: |
          ./publish/preflight-release.ps1 -Configuration Release -RuntimeIdentifier win-x64

      - name: Skip updater release preflight (no release path changes)
        if: steps.changed.outputs.release_paths != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping preflight: no updater/release pipeline files changed."

  release:
    name: Publish release
    needs: [build, quality]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Materialize upload text policy symkey
        shell: pwsh
        env:
          UPLOAD_TEXT_POLICY_SYMKEY_B64: ${{ secrets.UPLOAD_TEXT_POLICY_SYMKEY_B64 }}
        run: ./Resources/Embedded/materialize-upload-text-policy-symkey.ps1

      - name: Refresh embedded upload text policy (gzip + AES-GCM)
        shell: pwsh
        run: ./Resources/Embedded/gzip-policy.ps1

      - name: Publish single-file (win-x64, self-contained)
        shell: pwsh
        run: |
          dotnet publish "Gamepad Mapping.csproj" -c Release -r win-x64 --self-contained true `
            -o publish-single `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:ObfuscateUploadTextPolicyPayload=true

      - name: Publish framework-dependent (win-x64, runtime not bundled)
        shell: pwsh
        run: |
          dotnet publish "Gamepad Mapping.csproj" -c Release -r win-x64 --self-contained false `
            -o publish-fx `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:ObfuscateUploadTextPolicyPayload=true

      - name: Publish updater payload (win-x64, framework-dependent)
        run: >
          dotnet publish "Updater/Updater.csproj" -c Release -r win-x64 --self-contained false
          -p:DebugType=none -p:DebugSymbols=false
          -o publish-updater

      - name: Copy release docs into publish output
        shell: pwsh
        run: |
          $docs = @('README.md', 'README_zh.md', 'CHANGELOG.md', 'RELEASE_NOTES.md')
          foreach ($out in @('publish-single', 'publish-fx')) {
            foreach ($f in $docs) {
              if (Test-Path -LiteralPath "$f") {
                Copy-Item -LiteralPath "$f" -Destination "$out" -Force
              }
            }
          }

      - name: Load updater payload manifest
        shell: pwsh
        run: |
          $manifest = "publish/updater-required-files.txt"
          if (-not (Test-Path -LiteralPath "$manifest")) {
            throw "Updater payload manifest not found: $manifest"
          }
          $items = Get-Content -LiteralPath "$manifest" |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ -and -not $_.StartsWith('#') }
          if (-not $items -or $items.Count -eq 0) {
            throw "Updater payload manifest is empty: $manifest"
          }
          $joined = [string]::Join(';', $items)
          "UPDATER_REQUIRED_FILES=$joined" | Out-File -FilePath "$env:GITHUB_ENV" -Encoding utf8 -Append

      - name: Copy and verify updater payload in publish outputs
        shell: pwsh
        run: |
          $required = $env:UPDATER_REQUIRED_FILES -split ';' | Where-Object { $_ }
          foreach ($f in $required) {
            $src = Join-Path 'publish-updater' "$f"
            if (-not (Test-Path -LiteralPath "$src")) {
              throw "Missing required updater file in updater publish output: $src"
            }
            Copy-Item -LiteralPath "$src" -Destination 'publish-single' -Force
            Copy-Item -LiteralPath "$src" -Destination 'publish-fx' -Force
            foreach ($out in @('publish-single', 'publish-fx')) {
              $path = Join-Path "$out" "$f"
              if (-not (Test-Path -LiteralPath "$path")) {
                throw "Missing required updater file in publish output: $path"
              }
            }
          }

      - name: Sign executables (Self-signed)
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERT_BASE64)) {
            Write-Warning "CERT_BASE64 secret is missing. Skipping executable signing."
            return
          }
          $certPath = Join-Path (Get-Location) "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_BASE64))
          
          # Find signtool.exe
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse | 
                      Where-Object { $_.FullName -match "x64" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found." }

          $filesToSign = Get-ChildItem -Path "publish-single", "publish-fx" -Include "*.exe", "*.dll" -Recurse | Select-Object -ExpandProperty FullName
          foreach ($f in $filesToSign) {
            Write-Host "Signing: $f"
            # Use RFC 3161 (/tr and /td sha256) for modern SHA-256 timestamping.
            # Use --% to stop PowerShell from parsing arguments, or ensure $f is quoted for the external command.
            & $signtool sign /f "$certPath" /p "$($env:CERT_PASSWORD)" /tr http://timestamp.digicert.com /td sha256 /fd sha256 /v "$f"
          }
          Remove-Item "$certPath" -Force

      - name: Zip artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path "publish-single\*" -DestinationPath "Gamepad-Mapping-${{ github.ref_name }}-win-x64-single.zip"
          Compress-Archive -Path "publish-fx\*" -DestinationPath "Gamepad-Mapping-${{ github.ref_name }}-win-x64-fx.zip"

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $files = @(
            "Gamepad-Mapping-${{ github.ref_name }}-win-x64-single.zip",
            "Gamepad-Mapping-${{ github.ref_name }}-win-x64-fx.zip"
          )
          foreach ($f in $files) {
            if (-not (Test-Path -LiteralPath "$f")) {
              throw "Missing release artifact: $f"
            }
          }
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash -LiteralPath "$f" -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $f"
          }
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllLines("SHA256SUMS", $lines, $utf8)

      - name: Sign SHA256SUMS (required)
        shell: pwsh
        env:
          UPDATE_SIGNING_PRIVATE_KEY_PEM_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_PEM_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_SIGNING_PRIVATE_KEY_PEM_B64)) {
            throw "Missing required secret: UPDATE_SIGNING_PRIVATE_KEY_PEM_B64"
          }
          $pemBytes = [Convert]::FromBase64String($env:UPDATE_SIGNING_PRIVATE_KEY_PEM_B64)
          $pem = [System.Text.Encoding]::UTF8.GetString($pemBytes)
          $rsa = [System.Security.Cryptography.RSA]::Create()
          $rsa.ImportFromPem($pem)
          $data = [System.IO.File]::ReadAllBytes("SHA256SUMS")
          $signature = $rsa.SignData($data, [System.Security.Cryptography.HashAlgorithmName]::SHA256, [System.Security.Cryptography.RSASignaturePadding]::Pkcs1)
          [System.IO.File]::WriteAllBytes("SHA256SUMS.sig", $signature)

      - name: Verify SHA256SUMS signature in CI (self-check)
        shell: pwsh
        env:
          UPDATE_SIGNING_PUBLIC_KEY_PEM_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_PEM_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_SIGNING_PUBLIC_KEY_PEM_B64)) {
            throw "Missing required secret: UPDATE_SIGNING_PUBLIC_KEY_PEM_B64"
          }
          if (-not (Test-Path -LiteralPath "SHA256SUMS")) {
            throw "Missing SHA256SUMS for signature verification."
          }
          if (-not (Test-Path -LiteralPath "SHA256SUMS.sig")) {
            throw "Missing SHA256SUMS.sig for signature verification."
          }

          $pemBytes = [Convert]::FromBase64String($env:UPDATE_SIGNING_PUBLIC_KEY_PEM_B64)
          $pem = [System.Text.Encoding]::UTF8.GetString($pemBytes)
          $rsa = [System.Security.Cryptography.RSA]::Create()
          $rsa.ImportFromPem($pem)

          $data = [System.IO.File]::ReadAllBytes("SHA256SUMS")
          $signature = [System.IO.File]::ReadAllBytes("SHA256SUMS.sig")
          $ok = $rsa.VerifyData($data, $signature, [System.Security.Cryptography.HashAlgorithmName]::SHA256, [System.Security.Cryptography.RSASignaturePadding]::Pkcs1)
          if (-not $ok) {
            throw "Release integrity self-check failed: SHA256SUMS signature verification did not pass."
          }

      - name: Prepare release body from CHANGELOG.md
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $raw = Get-Content -LiteralPath "CHANGELOG.md" -Raw
          if ([string]::IsNullOrWhiteSpace($raw)) { throw "CHANGELOG.md is empty." }
          $ver = $env:TAG_NAME.TrimStart('v')
          $escapedVer = [regex]::Escape($ver)
          # Capture the full release block for this version:
          # English section + optional Chinese section, up to next English version heading.
          $pattern = "(?ms)^##\s+Changelog\s+`?v$escapedVer`?.*?(?=^##\s+Changelog\s+`?v|\z)"
          if ($raw -notmatch $pattern) {
            throw "CHANGELOG.md must contain a section starting with '## Changelog v$ver'."
          }
          $body = $matches[0].TrimEnd()
          $firstLine = (($body -split "`r?`n")[0]).TrimEnd()
          if ($firstLine -notmatch "^##\s+Changelog\s+`?v$escapedVer`?(\s|—|-|$)") {
            throw "CHANGELOG first heading must be '## Changelog v$ver ...' (tag $($env:TAG_NAME)); got: $firstLine"
          }
          $path = Join-Path (Get-Location) "release-body.md"
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($path, $body + [Environment]::NewLine, $utf8)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            Gamepad-Mapping-${{ github.ref_name }}-win-x64-single.zip
            Gamepad-Mapping-${{ github.ref_name }}-win-x64-fx.zip
            SHA256SUMS
            SHA256SUMS.sig
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics-${{ github.ref_name }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            publish-single/**
            publish-fx/**
            publish-updater/**
            release-body.md
            SHA256SUMS
            SHA256SUMS.sig
